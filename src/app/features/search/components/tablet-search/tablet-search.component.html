<div class="tablet-search" [class.is-active]="searchService.isSearchActive()">
  <div class="tablet-search__field" [class.is-active]="searchService.isSearchActive()">
    <input
      #searchInput
      type="text"
      [placeholder]="'search.input.placeholder' | translate"
      class="tablet-search__input search-input-modern bg-white text-black px-3 py-1.5 rounded-lg outline-none"
      [class.is-active]="searchService.isSearchActive()"
      [value]="searchService.searchTerm()"
      (input)="handleInput($event)"
      (keydown)="handleKeydown($event)" />

    @if (searchService.searchResults().length > 0) {
      <ul #resultsList class="tablet-search__results">
        @for (product of searchService.searchResults(); track product.id) {
          <li (click)="handleResultClick(product.id)" class="tablet-search__result">
            <img
              [src]="getAssetUrl(product.imagen)"
              [alt]="getProductName(product)"
              width="40"
              height="40"
              class="tablet-search__thumb" />
            <div class="tablet-search__item-content">
              <span class="tablet-search__label">{{ getProductName(product) }}</span>
            </div>
          </li>
        }
      </ul>
    }
  </div>

  <button
    (click)="handleToggleClick()"
    class="util-btn group relative"
    [attr.aria-label]="(searchService.isSearchActive() ? ('search.button.submit' | translate) : ('search.button.open' | translate))">
    @if (searchService.isSearchActive()) {
      <app-icon name="close" className="util-icon w-6 h-6 transition-all duration-300 text-red-500 scale-[2]"></app-icon>
    } @else {
      <app-icon name="search" className="util-icon w-6 h-6 transition-all duration-300"></app-icon>
    }
  </button>

  <a routerLink="/cart" class="util-btn tablet-search__cart group relative" [attr.aria-label]="'header.cart_label' | translate">
    <app-icon name="cart" className="util-icon w-6 h-6 md:w-[27px] md:h-[27px]"></app-icon>
    @if (cartService.totalItems() > 0) {
      <span class="cart-badge absolute -top-1 -right-1 bg-red-600 text-[9px] font-bold px-1.5 py-0.5 rounded-full">
        {{ cartService.totalItems() }}
      </span>
    }
  </a>
</div>
