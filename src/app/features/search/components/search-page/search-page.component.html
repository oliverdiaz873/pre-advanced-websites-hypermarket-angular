<div class="w-full">
  <!-- Header -->
  <div class="mb-6 pb-4 border-b border-gray-100">
    <h1 class="text-2xl font-extrabold text-gray-950 tracking-tight">
      Resultados de búsqueda
    </h1>
    @if (query()) {
      <p class="text-sm text-gray-500 mt-1">
        <span class="font-semibold text-gray-700">{{ results().length }}</span>
        {{ results().length === 1 ? 'resultado' : 'resultados' }} para
        "<span class="font-semibold text-green-700">{{ query() }}</span>"
      </p>
    }
  </div>

  <!-- Results -->
  @if (results().length > 0) {
    <app-product-grid [products]="results()">
    </app-product-grid>
  } @else {
    <app-empty-search-results [query]="query()"></app-empty-search-results>
  }
</div>
