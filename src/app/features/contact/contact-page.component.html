<section id="contacto" class="w-full px-4 py-1 md:py-1 lg:py-1 flex justify-center">
  <main class="contacto-container w-full max-w-[550px] md:max-w-[700px] lg:max-w-[750px] xl:max-w-[800px] mx-auto my-3 md:my-10 lg:my-5 p-5 md:p-8 lg:p-9 xl:p-10 rounded-lg bg-[#1a1a1c] border border-white/10 text-white shadow-2xl">
    <app-contact-form (onSuccess)="showSuccessToast()" />

    <section class="contacto-info mt-5 md:mt-5">
      <h2 class="text-xl md:text-2xl text-center mb-6 md:mb-8 pt-4 md:pt-6">{{ 'contact.info.title' | translate }}</h2>
      <div class="info-item text-center mb-4">
        <p><strong>{{ 'contact.info.email_label' | translate }}</strong> soporte@hipermercadosuperior.com</p>
      </div>
      <div class="info-item text-center mb-4">
        <p><strong>{{ 'contact.info.phone_label' | translate }}</strong> +1 (809) 555-5555</p>
      </div>
      <div class="info-item text-center mb-4">
        <p><strong>{{ 'contact.info.hours_label' | translate }}</strong> {{ 'contact.info.hours_text' | translate }}</p>
      </div>
    </section>
  </main>
</section>
