<header class="app-header" [class.menu-open]="isMobileMenuOpen()" (click)="isMobileMenuOpen.set(false)">
  <div class="header-inner">
    <!-- Mobile hamburger menu (visible on mobile and tablet) -->
    @if (viewportMode() !== 'desktop') {
      <button class="menu-btn" (click)="isMobileMenuOpen.set(!isMobileMenuOpen()); $event.stopPropagation()"
        [attr.aria-label]="(isMobileMenuOpen() ? 'header.menu_close' : 'header.menu_open') | translate">
        <span class="hamburger-line" [class.open]="isMobileMenuOpen()"></span>
        <span class="hamburger-line" [class.open]="isMobileMenuOpen()"></span>
        <span class="hamburger-line" [class.open]="isMobileMenuOpen()"></span>
      </button>
    }

    <!-- Brand logo and title (H1 on homepage, span otherwise) -->
    @if (showBrand()) {
      <a routerLink="/" class="brand">
        <img src="/assets/images/logo/logo.png" alt="Logo" class="brand-logo" width="36" height="36" />
        @if (isHomePage()) {
          <h1 class="brand-title">{{ 'header.brand' | translate }}</h1>
        } @else {
          <span class="brand-title">{{ 'header.brand' | translate }}</span>
        }
      </a>
    }

    <!-- Responsive navigation (desktop only) -->
    @if (showNavigation()) {
      @if (viewportMode() === 'desktop') {
        <app-desktop-nav></app-desktop-nav>
      }
    }

    <!-- Search component (viewport-aware variant handled by child components) -->
    <app-header-search
      [viewportMode]="viewportMode()"
      (searchToggle)="onSearchToggle($event)"
    ></app-header-search>

    <!-- Language selector (only on desktop) -->
    @if (viewportMode() === 'desktop') {
      <app-language-selector></app-language-selector>
    }
  </div>
</header>

<div class="mobile-nav-wrapper">
  <app-mobile-nav
    [isOpen]="isMobileMenuOpen()"
    [showLanguage]="showDrawerLanguage()"
    (close)="isMobileMenuOpen.set(false)">
  </app-mobile-nav>
</div>
