<div class="quantity-controls">
  <button
    type="button"
    class="quantity-controls__btn"
    (click)="onDecrease()"
    [attr.aria-label]="ariaLabels.decrease"
  >-</button>
  <span class="quantity-controls__display">{{ quantity }}</span>
  <button
    type="button"
    class="quantity-controls__btn"
    (click)="onIncrease()"
    [attr.aria-label]="ariaLabels.increase"
  >+</button>
</div>
