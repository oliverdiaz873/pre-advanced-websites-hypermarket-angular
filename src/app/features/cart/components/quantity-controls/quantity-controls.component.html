<div class="inline-flex items-center border border-gray-200 rounded-lg bg-white overflow-hidden shadow-xs">
  <button 
    type="button" 
    (click)="onDecrease()" 
    class="px-3 py-1.5 text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors duration-150 focus:outline-hidden"
    aria-label="Disminuir cantidad">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
    </svg>
  </button>
  
  <input 
    type="number" 
    [value]="quantity" 
    (change)="onInputChange($event)"
    class="w-12 text-center border-none text-sm font-semibold text-gray-800 focus:ring-0 focus:outline-hidden [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
    aria-label="Cantidad" />
  
  <span class="text-xs text-gray-500 pr-2 border-r border-gray-100 select-none">
    {{ unitLabel }}
  </span>
  
  <button 
    type="button" 
    (click)="onIncrease()" 
    class="px-3 py-1.5 text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors duration-150 focus:outline-hidden"
    aria-label="Aumentar cantidad">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
    </svg>
  </button>
</div>
