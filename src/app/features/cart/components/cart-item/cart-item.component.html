<div class="cart-item">
  <a [routerLink]="['/product', item.productId]" class="cart-item__image-link" [attr.aria-label]="'Ver ' + (item.productId | productTranslate:item.nombre)">
    <div class="cart-item__image-container">
      @if (getIsOffer()) {
        <div class="cart-item__badge-wrapper">
          <app-offer-badge [text]="getDiscountText()"></app-offer-badge>
        </div>
      }
      <img [src]="getImageUrl(item.imagen)" [alt]="(item.productId | productTranslate:item.nombre)" class="cart-item__image" />
    </div>
  </a>

  <div class="cart-item__content">
    <div class="cart-item__header">
      <a [routerLink]="['/product', item.productId]" class="cart-item__name-link" [attr.aria-label]="'Ver ' + (item.productId | productTranslate:item.nombre)">
        <h3 class="cart-item__name">{{ item.productId | productTranslate:item.nombre }}</h3>
      </a>
      <button
        type="button"
        (click)="onRemoveClick()"
        class="cart-item__remove-icon"
        aria-label="Eliminar producto">
        <app-icon name="trash" className="h-5 w-5"></app-icon>
      </button>
    </div>

    <div class="cart-item__variant">
      <span class="cart-item__unit">{{ getFormattedPrice(item.unitPrice) }} / {{ item.unitLabel }}</span>
    </div>

    <div class="cart-item__footer">
      <div class="cart-item__price-block">
        @if (getIsOffer()) {
          <ins class="cart-item__new-price">{{ getFormattedPrice(item.unitPrice) }}</ins>
          <del class="cart-item__old-price">{{ getOldPriceDisplay() }}</del>
        } @else {
          <span class="cart-item__price">{{ getFormattedPrice(item.unitPrice) }}</span>
        }
      </div>

      <app-quantity-controls
        [quantity]="item.quantity"
        [unitLabel]="item.unitLabel"
        (quantityChange)="onQuantityChange($event)">
      </app-quantity-controls>
    </div>
  </div>
</div>
