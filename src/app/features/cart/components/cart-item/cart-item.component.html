<div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-white border border-gray-100 rounded-xl shadow-xs hover:shadow-md transition-shadow duration-200 gap-4">
  <!-- Product Info -->
  <div class="flex items-center gap-4 flex-1">
    <div class="w-16 h-16 rounded-lg overflow-hidden border border-gray-100 shrink-0 bg-gray-50 flex items-center justify-center">
      <img [src]="getImageUrl(item.imagen)" [alt]="(item.productId | productTranslate:item.nombre)" class="max-w-full max-h-full object-contain" />
    </div>
    
    <div>
      <h4 class="font-bold text-gray-900 text-base line-clamp-1 hover:text-green-700 transition-colors">
        {{ item.productId | productTranslate:item.nombre }}
      </h4>
      <p class="text-sm text-gray-500 mt-0.5">
        {{ getFormattedPrice(item.unitPrice) }} / {{ item.unitLabel }}
      </p>
    </div>
  </div>

  <!-- Controls & Action sub-block -->
  <div class="flex items-center justify-between sm:justify-end gap-6 sm:gap-8 border-t sm:border-t-0 pt-3 sm:pt-0 border-gray-50">
    <!-- Quantity Controls -->
    <div>
      <app-quantity-controls 
        [quantity]="item.quantity" 
        [unitLabel]="item.unitLabel"
        (quantityChange)="onQuantityChange($event)">
      </app-quantity-controls>
    </div>

    <!-- Subtotal & Remove -->
    <div class="flex items-center gap-4 min-w-[100px] justify-end">
      <div class="text-right">
        <span class="text-xs text-gray-400 block font-medium">Subtotal</span>
        <span class="text-sm font-bold text-gray-900">
          {{ getSubtotal(item.unitPrice, item.quantity) }}
        </span>
      </div>
      
      <button 
        type="button" 
        (click)="onRemoveClick()" 
        class="text-gray-400 hover:text-red-500 p-1.5 rounded-lg hover:bg-red-50 transition-colors focus:outline-hidden"
        aria-label="Eliminar producto">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
    </div>
  </div>
</div>
