<section
  appScrollScale
  class="about-us-section w-[calc(100vw-40px)] max-w-full mx-auto mt-10 mb-6 md:mt-9 md:mb-10 bg-black text-white py-5 rounded-[20px] overflow-hidden"
>
  <div class="flex flex-col md:flex-row items-center justify-center gap-8 md:gap-10 lg:gap-16 px-5 py-4 md:px-8">
    <img
      [src]="getAssetUrl('assets/images/logo/logo-with-background.jpeg')"
      [alt]="'home.about_us.logo_alt' | translate"
      class="w-[250px] md:w-[350px] lg:w-[450px] h-auto rounded-[15px] shrink-0"
    />
    <div class="max-w-[600px] text-center md:text-left">
      <h2 class="text-2xl md:text-3xl font-semibold mb-4">
        {{ 'home.about_us.title' | translate }}
      </h2>
      <p class="text-base md:text-lg leading-relaxed">
        {{ 'home.about_us.description' | translate }}
      </p>
    </div>
  </div>
</section>
