<section class="producto-detalle">  <div class="contenedor-producto">    <figure class="imagen-producto">      <img        [src]="getAssetUrl(product.imagen)"        [alt]="product.id | productTranslate: product.name"        width="600"        height="600"        (click)="openModal()"        [title]="'productDetail.clickToEnlarge' | translate" />    </figure>    <div      #modalContainer      class="modal-imagen"      [class.modal-activo]="modalOpen"      role="dialog"      aria-modal="true"      [attr.aria-label]="'productDetail.expandedImage' | translate: { name: productTranslation.getName(product) }"      (click)="closeModal()">      <button        #closeBtn        class="modal-close-button"        [attr.aria-label]="'productDetail.closeModal' | translate"        (click)="closeModal(); $event.stopPropagation()">        &#10005;      </button>      <img        [src]="getAssetUrl(product.imagen)"        [alt]="'productDetail.expandedImage' | translate: { name: productTranslation.getName(product) }"        width="1200"        height="1200"        class="max-w-[90vw] max-h-[90vh] object-contain"        (click)="$event.stopPropagation()" />    </div>    <div class="info-producto">      <h1>{{ product.id | productTranslate: product.name }}</h1>      <p class="precio">{{ product.precioTexto }}</p>      <p class="descripcion">{{ description }}</p>      @if (specs.length) {        <ul class="detalles">          @for (detalle of specs; track detalle) {            <li>{{ detalle }}</li>          }        </ul>      }      <div class="action-area">        <app-add-to-cart-button [product]="product"></app-add-to-cart-button>      </div>    </div>  </div></section>
