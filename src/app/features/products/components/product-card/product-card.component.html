<article [class.offer-card]="isOffer" class="producto product-card block shrink-0 snap-start">
  @if (discountPercentage) {
    <app-offer-badge class="offer-badge-slot" [discountPercentage]="discountPercentage"></app-offer-badge>
  }

  <a [routerLink]="['/product', product.id]"
     class="product-card__overlay-link"
     [attr.aria-label]="'Ver detalles de ' + (product.id | productTranslate:product.nombre)">
  </a>

  <div class="producto-img-container">
    <img [src]="getAssetUrl(product.imagen)" [alt]="(product.id | productTranslate:product.nombre)" loading="lazy" />
  </div>

  <div class="price-block-container">
    <div class="price-block">
      @if (isOffer && oldPrice) {
        <ins class="precio-nuevo">{{ cleanPrice(product.precioTexto) }}</ins>
        <del class="precio-antiguo">{{ cleanPrice(oldPrice) }}</del>
      } @else {
        <p class="producto-price">{{ cleanPrice(product.precioTexto) }}</p>
      }
    </div>
    <p class="producto-unit-format">
      ${{ product.precio.toLocaleString() }} / {{ getUnitLabel(product) }}
    </p>
  </div>

  <h3 class="producto-title">{{ product.id | productTranslate:product.nombre }}</h3>

  <app-add-to-cart-button [product]="product"></app-add-to-cart-button>
</article>
