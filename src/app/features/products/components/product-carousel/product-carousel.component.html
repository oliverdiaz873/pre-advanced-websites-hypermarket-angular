<div class="productos-container-wrapper relative flex items-center justify-center">
  @if (showPrev()) {
    <button
      type="button"
      (click)="scrollLeft()"
      class="productos-control-prev"
      [id]="idPrefix + '-prev'"
      [attr.aria-label]="'home.hero.prev' | translate">
      <app-icon name="product-carousel-chevron-left" className="w-5 h-5"></app-icon>
    </button>
  }

  <div
    #scrollContainer
    class="productos-container flex w-full gap-4 md:gap-5 overflow-x-auto pb-8 snap-x snap-mandatory scroll-smooth
           scrollbar-hide [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">
    @for (product of products; track trackById($index, product)) {
      <app-product-card
        class="snap-start shrink-0"
        [product]="product"
        [oldPrice]="product.oldPrice"
        [discountPercentage]="product.discountPercentage">
      </app-product-card>
    }
  </div>

  @if (showNext()) {
    <button
      type="button"
      (click)="scrollRight()"
      class="productos-control-next"
      [id]="idPrefix + '-next'"
      [attr.aria-label]="'home.hero.next' | translate">
      <app-icon name="product-carousel-chevron-right" className="w-5 h-5"></app-icon>
    </button>
  }
</div>
