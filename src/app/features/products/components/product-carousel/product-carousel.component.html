<div class="productos-container-wrapper relative flex items-center justify-center">
  @if (showPrev() && products.length > 3) {
    <button
      type="button"
      (click)="scrollLeft()"
      class="productos-control-prev"
      aria-label="Desplazar izquierda">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
  }

  <div
    #scrollContainer
    class="productos-container flex w-full gap-4 md:gap-5 overflow-x-auto pb-8 snap-x snap-mandatory scroll-smooth
           scrollbar-hide [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">
    @for (product of products; track trackById($index, product)) {
      <app-product-card
        class="snap-start shrink-0"
        [product]="product"
        [oldPrice]="product.oldPrice"
        [discountPercentage]="product.discountPercentage">
      </app-product-card>
    }
  </div>

  @if (showNext() && products.length > 3) {
    <button
      type="button"
      (click)="scrollRight()"
      class="productos-control-next"
      aria-label="Desplazar derecha">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  }
</div>
