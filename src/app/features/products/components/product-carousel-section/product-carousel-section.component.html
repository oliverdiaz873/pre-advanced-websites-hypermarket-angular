<section [class]="sectionClassNames" [attr.id]="id">
  <div class="product-carousel-section__inner">
    @if (title) {
      <h2 class="product-carousel-section__title">
        {{ title }}
      </h2>
    }

    <app-product-carousel [products]="products"></app-product-carousel>
  </div>
</section>
