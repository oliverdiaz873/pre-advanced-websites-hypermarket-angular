<section class="empty-state" [ngClass]="[className || '', 'empty-state--' + appearance]">
  <div class="icon-wrapper">
    <ng-content select="[icon]"></ng-content>
  </div>
  <h2>{{ title }}</h2>
  @if (description) {
    <p>{{ description }}</p>
  }
  @if (hasAction) {
    <div class="actions">
      @if (isLink) {
        <a [routerLink]="actionHref" class="action-btn">{{ actionLabel }}</a>
      } @else {
        <button type="button" class="action-btn" (click)="handleAction()">{{ actionLabel }}</button>
      }
    </div>
  }
</section>
