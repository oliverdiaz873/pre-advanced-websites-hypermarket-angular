<main class="min-h-screen bg-gray-50 flex flex-col items-center">
  <!-- Top Navigation Header -->
  <header class="max-w-6xl w-full mb-8 pt-8 px-4 flex flex-col sm:flex-row items-center justify-between gap-4">
    <div class="text-center sm:text-left cursor-pointer" routerLink="/">
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight flex items-center justify-center sm:justify-start gap-2 hover:opacity-90 transition-opacity">
        <span class="text-green-600">🛒</span> {{ 'header.brand' | translate }}
      </h1>
      <p class="text-gray-500 mt-1 text-sm font-medium">
        Catálogo Completo y Ofertas Exclusivas
      </p>
    </div>

    <!-- Cart Button & Badge -->
    <a 
      routerLink="/cart" 
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 active:bg-gray-100 text-gray-800 font-bold text-sm shadow-xs transition-all cursor-pointer select-none">
      <div class="relative flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        @if (totalItems() > 0) {
          <span class="absolute -top-3.5 -right-3.5 flex h-5 w-5 items-center justify-center rounded-full bg-red-500 text-[10px] font-black text-white ring-2 ring-white animate-pulse">
            {{ totalItems() }}
          </span>
        }
      </div>
      <span>Ver Carrito</span>
    </a>
  </header>

  <!-- Page Content Outlet -->
  <section class="max-w-6xl w-full px-4 pb-16">
    <router-outlet></router-outlet>
  </section>
</main>
