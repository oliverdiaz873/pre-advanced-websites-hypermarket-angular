<main class="min-h-screen bg-gray-100 p-8 flex flex-col items-center">
  <header class="max-w-6xl w-full mb-8 text-center md:text-left">
    <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">
      Hipermercado Superior — Fase 1 (Mocks)
    </h1>
    <p class="text-gray-600 mt-2 text-sm">
      Demo de cuadrícula y tarjeta de producto en Angular
    </p>
  </header>

  <section class="max-w-6xl w-full">
    <app-product-grid 
      [products]="products" 
      actionText="Agregar"
      (productAction)="onProductAction($event)">
    </app-product-grid>
  </section>
</main>
